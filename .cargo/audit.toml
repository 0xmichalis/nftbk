[advisories]
# Critical vulnerabilities - ignoring until dependencies are updated upstream
ignore = [
    # curve25519-dalek 3.2.0 - needs >=4.1.3 (from tezos-core and solana)
    "RUSTSEC-2024-0344",
    # ed25519-dalek 1.0.1 - needs >=2 (from tezos-core and solana)
    "RUSTSEC-2022-0093",
    # rsa 0.9.8 - no fix available (from sqlx-mysql, but we use postgres)
    "RUSTSEC-2023-0071",
    # rustls-webpki 0.101.7 - CRLs vuln (from x402-rs->solana->tungstenite 0.20).
    # Fix requires >=0.103.10; we patch 0.103.8->0.103.10. The 0.101.7 is in
    # rustls 0.21/webpki-roots 0.24 which require ^0.101.7 (semver excludes 0.103).
    "RUSTSEC-2026-0049",
]
